<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>আল্ট্রা-প্রিমিয়াম চেস (Smart & Fast AI)</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Poppins:wght@400;600;800&display=swap');

        :root {
            --board-light: #f0d9b5;
            --board-dark: #b58863;
            --highlight: rgba(255, 255, 51, 0.5);
            --bg-color: var(--tg-theme-bg-color, #0d1117);
            --panel-bg: rgba(55, 65, 81, 0.95); 
            --text-color: var(--tg-theme-text-color, #c9d1d9);
        }

        body {
            font-family: 'Noto Sans Bengali', 'Poppins', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .player-panel {
            width: 100%;
            max-width: 600px;
            padding: 10px 15px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            box-sizing: border-box;
            position: relative;
        }

        .active-panel {
            background: rgba(46, 160, 67, 0.25);
            border-color: rgba(46, 160, 67, 0.6);
        }

        .rotate-180 { transform: rotate(180deg); }

        .captured-pieces {
            display: flex;
            flex-wrap: wrap;
            gap: -5px;
            max-width: 150px;
            align-items: center;
            min-height: 24px;
        }

        .captured-piece {
            width: 22px;
            height: 22px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-left: -8px;
        }
        
        .captured-piece:first-child { margin-left: 0; }

        .board-wrapper {
            width: 95vw;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            position: relative;
            margin: 15px 0;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 0 6px #21262d;
            overflow: hidden;
            background-color: var(--board-light);
        }

        .grid-layer, .interaction-layer, .pieces-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
        }

        .grid-layer { pointer-events: none; }
        .interaction-layer { z-index: 10; }
        .pieces-layer { pointer-events: none; z-index: 5; display: block; }

        .square { width: 100%; height: 100%; }
        .square.dark { background-color: var(--board-dark); }
        .square.light { background-color: var(--board-light); }

        .interact-square {
            width: 100%; height: 100%;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .interact-square.selected { background-color: var(--highlight); }
        .in-check { background-color: rgba(255, 0, 0, 0.6) !important; }
        .valid-dot { width: 25%; height: 25%; background-color: rgba(0, 0, 0, 0.4); border-radius: 50%; }
        .valid-capture { width: 85%; height: 85%; border: 5px solid rgba(0, 0, 0, 0.4); border-radius: 50%; }

        .piece {
            position: absolute;
            width: 12.5%; height: 12.5%;
            background-size: 95%;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.2s ease;
            will-change: transform;
        }

        .modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }
        
        .theme-btn, .piece-set-btn { border: 2px solid transparent; transition: 0.2s; cursor: pointer; }
        .theme-btn.active, .piece-set-btn.active { border-color: #2ea043; transform: scale(1.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <div id="setup-modal" class="modal">
        <div class="bg-[#161b22] border border-[#30363d] p-6 rounded-xl w-[90%] max-w-lg max-h-[95vh] overflow-y-auto scrollbar-hide">
            <h2 class="text-xl font-bold mb-4 text-center text-white"><i class="fas fa-chess-king text-[#2ea043] mr-2"></i>গেম সেটিংস</h2>
            
            <div class="space-y-3 mb-4">
                <div class="col-span-2">
                    <label class="block text-xs text-gray-400 mb-1">কার সাথে খেলবেন?</label>
                    <select id="opponent-mode" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-2 text-sm text-white outline-none" onchange="toggleOpponentMode()">
                        <option value="friend">বন্ধুর সাথে (Local)</option>
                        <option value="computer">কম্পিউটারের সাথে (AI)</option>
                    </select>
                </div>

                <div id="difficulty-container" class="col-span-2 hidden">
                    <label class="block text-xs text-gray-400 mb-1">কম্পিউটারের লেভেল</label>
                    <select id="ai-difficulty" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-2 text-sm text-white outline-none">
                        <option value="easy">ইজি (Smart Basic)</option>
                        <option value="medium">মিডিয়াম (Advanced)</option>
                        <option value="high">হাই (Master Level)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">সাদা প্লেয়ার</label>
                        <input type="text" id="white-name" placeholder="প্লেয়ার ১" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-2 text-sm text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">কালো প্লেয়ার</label>
                        <input type="text" id="black-name" placeholder="প্লেয়ার ২" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-2 text-sm text-white outline-none">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">গেম মোড</label>
                        <select id="game-mode" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-2 text-sm text-white outline-none" onchange="document.getElementById('time-container').classList.toggle('hidden', this.value === 'classic')">
                            <option value="classic">ক্লাসিক</option>
                            <option value="quick">কুইক (টাইমার)</option>
                        </select>
                    </div>
                    <div id="time-container" class="hidden">
                        <label class="block text-xs text-gray-400 mb-1">সময় (মিনিট)</label>
                        <input type="number" id="time-limit" value="10" min="1" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-2 text-sm text-white outline-none">
                    </div>
                </div>
            </div>

            <label class="block text-sm font-semibold text-white mb-2 border-b border-[#30363d] pb-1">গুটির ডিজাইন</label>
            <div class="grid grid-cols-5 gap-2 mb-4" id="piece-set-grid"></div>

            <label class="block text-sm font-semibold text-white mb-2 border-b border-[#30363d] pb-1">বোর্ডের থিম</label>
            <div class="grid grid-cols-5 gap-2 mb-5" id="theme-grid"></div>

            <button onclick="startGame()" class="w-full bg-[#238636] hover:bg-[#2ea043] text-white font-bold py-3 rounded transition text-lg shadow-lg">গেম শুরু করুন</button>
        </div>
    </div>

    <div id="game-over-modal" class="modal" style="display: none;">
        <div class="bg-[#161b22] border border-[#30363d] p-8 rounded-xl w-[90%] max-w-sm text-center">
            <i class="fas fa-trophy text-5xl text-yellow-500 mb-4"></i>
            <h2 id="winner-msg" class="text-3xl font-bold text-white mb-2"></h2>
            <p id="reason-msg" class="text-gray-400 mb-6"></p>
            <button onclick="location.reload()" class="bg-[#2ea043] text-white px-8 py-2 rounded font-bold hover:bg-[#238636] transition">নতুন গেম</button>
        </div>
    </div>

    <div id="black-panel" class="player-panel rotate-180 rounded-t-lg">
        <div class="flex flex-col w-full">
            <div class="flex justify-between items-center w-full">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded bg-[#1f2937] flex items-center justify-center border border-gray-500">
                        <i class="fas fa-chess-king text-gray-300 text-sm"></i>
                    </div>
                    <div>
                        <div id="black-display-name" class="font-bold text-base text-white">কালো প্লেয়ার</div>
                        <div class="text-[10px] text-gray-300">কালো গুটি</div>
                    </div>
                    <button onclick="togglePlayMode()" class="ml-2 bg-[#0d1117] text-gray-300 p-1.5 rounded-full border border-[#30363d] w-7 h-7 flex items-center justify-center">
                        <i class="fas fa-sync-alt text-xs"></i>
                    </button>
                </div>
                <div id="black-timer" class="text-xl font-mono font-bold text-gray-200 hidden">10:00</div>
            </div>
            <div id="black-captured" class="captured-pieces mt-1"></div>
        </div>
    </div>

    <div class="board-wrapper">
        <div class="grid-layer" id="bg-grid"></div>
        <div class="pieces-layer" id="pieces-layer"></div>
        <div class="interaction-layer" id="interact-grid"></div>
    </div>

    <div id="white-panel" class="player-panel rounded-b-lg active-panel">
        <div class="flex flex-col w-full">
            <div class="flex justify-between items-center w-full">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded bg-white flex items-center justify-center border border-gray-300">
                        <i class="fas fa-chess-king text-black text-sm"></i>
                    </div>
                    <div>
                        <div id="white-display-name" class="font-bold text-base text-white">সাদা প্লেয়ার</div>
                        <div class="text-[10px] text-gray-300">সাদা গুটি</div>
                    </div>
                    <button onclick="toggleHints()" id="hint-btn" class="ml-2 bg-[#2ea043] text-white p-1.5 rounded-full border border-[#30363d] w-7 h-7 flex items-center justify-center">
                        <i class="fas fa-lightbulb text-xs"></i>
                    </button>
                </div>
                <div id="white-timer" class="text-xl font-mono font-bold text-gray-200 hidden">10:00</div>
            </div>
            <div id="white-captured" class="captured-pieces mt-1"></div>
        </div>
    </div>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); 
            if (window.Telegram.WebApp.isVersionAtLeast('6.1')) {
                window.Telegram.WebApp.disableVerticalSwipes();
            }
        }

        const PIECE_SETS = [
            { id: 'cburnett', name: 'Classic' },
            { id: 'alpha', name: 'Alpha' },
            { id: 'merida', name: 'Merida' },
            { id: 'staunty', name: 'Staunty' },
            { id: 'kosal', name: 'Kosal' }
        ];

        const BOARD_THEMES = [
            { id: 'wood', name: 'Wood', light: '#f0d9b5', dark: '#b58863' },
            { id: 'green', name: 'Green', light: '#ffffdd', dark: '#86a666' },
            { id: 'blue', name: 'Ocean', light: '#dee3e6', dark: '#8ca2ad' },
            { id: 'classic', name: 'Classic', light: '#e3c16f', dark: '#b88b4a' },
            { id: 'dark', name: 'Dark', light: '#a3a3a3', dark: '#404040' },
            { id: 'neon', name: 'Neon', light: '#2d3748', dark: '#1a202c' },
            { id: 'coral', name: 'Coral', light: '#f9dfdf', dark: '#d86d6d' },
            { id: 'sand', name: 'Sand', light: '#e6d3a1', dark: '#a98c56' },
            { id: 'walnut', name: 'Walnut', light: '#d1bfae', dark: '#6e4f3a' },
            { id: 'marble', name: 'Marble', light: '#ffffff', dark: '#b3b3b3' }
        ];

        let selectedTheme = BOARD_THEMES[0];
        let selectedPieceSet = PIECE_SETS[0].id;
        
        let game = null; 
        let isFaceToFace = true; 

        let state = {
            piecesData: [],
            selected: null,
            validMoves: [],
            players: { white: 'সাদা', black: 'কালো' },
            mode: 'classic',
            opponentMode: 'friend', 
            difficulty: 'medium', 
            timers: { white: 600, black: 600 },
            interval: null,
            gameOver: false,
            pieceIdCounter: 0,
            captured: { white: [], black: [] },
            showHints: true 
        };

        const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
        function toAlgebraic(r, c) { return files[c] + (8 - r); }
        function fromAlgebraic(sq) { return { c: files.indexOf(sq[0]), r: 8 - parseInt(sq[1]) }; }

        function getPieceUrl(char, set = selectedPieceSet) {
            const color = char === char.toUpperCase() ? 'w' : 'b';
            const type = char.toUpperCase();
            return `https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/${set}/${color}${type}.svg`;
        }

        function toggleOpponentMode() {
            const isComp = document.getElementById('opponent-mode').value === 'computer';
            document.getElementById('difficulty-container').style.display = isComp ? 'block' : 'none';
            const blackInput = document.getElementById('black-name');
            if (isComp) {
                blackInput.value = 'কম্পিউটার (AI)';
                blackInput.disabled = true;
                blackInput.classList.add('opacity-50');
            } else {
                blackInput.value = '';
                blackInput.disabled = false;
                blackInput.classList.remove('opacity-50');
                blackInput.placeholder = 'প্লেয়ার ২';
            }
        }

        function togglePlayMode() {
            isFaceToFace = !isFaceToFace;
            const panel = document.getElementById('black-panel');
            if (isFaceToFace) {
                panel.classList.add('rotate-180');
            } else {
                panel.classList.remove('rotate-180');
            }
            state.piecesData.forEach(p => {
                if (p.color === 'black' && p.active) {
                    const rotation = isFaceToFace ? 'rotate(180deg)' : 'rotate(0deg)';
                    p.el.style.transform = `translate(${p.c * 100}%, ${p.r * 100}%) ${rotation}`;
                }
            });
            updateCapturedUI();
        }

        function toggleHints() {
            state.showHints = !state.showHints;
            const btn = document.getElementById('hint-btn');
            if (state.showHints) {
                btn.classList.replace('bg-[#0d1117]', 'bg-[#2ea043]');
                btn.classList.replace('text-gray-400', 'text-white');
            } else {
                btn.classList.replace('bg-[#2ea043]', 'bg-[#0d1117]');
                btn.classList.replace('text-white', 'text-gray-400');
            }
            updateInteractions(); 
        }

        function initSettingsUI() {
            const pieceGrid = document.getElementById('piece-set-grid');
            pieceGrid.innerHTML = ''; 
            PIECE_SETS.forEach((p, i) => {
                const btn = document.createElement('div');
                btn.className = `piece-set-btn bg-[#0d1117] rounded p-1 flex flex-col items-center justify-center ${i === 0 ? 'active' : ''}`;
                btn.innerHTML = `
                    <div class="w-6 h-6 bg-contain bg-center bg-no-repeat mb-1" style="background-image: url('${getPieceUrl('N', p.id)}')"></div>
                    <div class="text-[8px] text-gray-400 text-center">${p.name}</div>
                `;
                btn.onclick = () => {
                    document.querySelectorAll('.piece-set-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedPieceSet = p.id;
                };
                pieceGrid.appendChild(btn);
            });

            const themeGrid = document.getElementById('theme-grid');
            themeGrid.innerHTML = ''; 
            BOARD_THEMES.forEach((t, i) => {
                const btn = document.createElement('div');
                btn.className = `theme-btn rounded overflow-hidden h-8 flex flex-col ${i === 0 ? 'active' : ''}`;
                btn.innerHTML = `
                    <div class="flex-1 flex">
                        <div style="flex:1; background:${t.light}"></div>
                        <div style="flex:1; background:${t.dark}"></div>
                    </div>
                    <div class="text-[8px] text-center bg-[#0d1117] text-gray-300">${t.name}</div>
                `;
                btn.onclick = () => {
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedTheme = t;
                    document.documentElement.style.setProperty('--board-light', t.light);
                    document.documentElement.style.setProperty('--board-dark', t.dark);
                };
                themeGrid.appendChild(btn);
            });
        }

        function startGame() {
            if(typeof Chess === 'undefined') {
                alert("লাইব্রেরি লোড হয়নি! ইন্টারনেট চেক করে রিলোড দিন।");
                return;
            }
            
            state.players.white = document.getElementById('white-name').value || 'সাদা প্লেয়ার';
            state.opponentMode = document.getElementById('opponent-mode').value;
            state.difficulty = document.getElementById('ai-difficulty').value;
            
            if (state.opponentMode === 'computer') {
                let lvl = state.difficulty === 'easy' ? 'ইজি' : (state.difficulty === 'medium' ? 'মিডিয়াম' : 'হাই');
                state.players.black = `কম্পিউটার (${lvl})`;
            } else {
                state.players.black = document.getElementById('black-name').value || 'কালো প্লেয়ার';
            }

            state.mode = document.getElementById('game-mode').value;
            const time = parseInt(document.getElementById('time-limit').value) * 60;
            state.timers = { white: time, black: time };

            document.getElementById('white-display-name').innerText = state.players.white;
            document.getElementById('black-display-name').innerText = state.players.black;

            if(state.mode === 'quick') {
                document.getElementById('white-timer').classList.remove('hidden');
                document.getElementById('black-timer').classList.remove('hidden');
                updateTimerDisplay();
                startTimer();
            }

            document.getElementById('setup-modal').style.display = 'none';
            setupBoard();
        }

        function setupBoard() {
            game = new Chess(); 
            
            const bgGrid = document.getElementById('bg-grid');
            const interactGrid = document.getElementById('interact-grid');
            const piecesLayer = document.getElementById('pieces-layer');
            
            bgGrid.innerHTML = '';
            interactGrid.innerHTML = '';
            piecesLayer.innerHTML = '';
            state.piecesData = [];
            state.captured = { white: [], black: [] };
            updateCapturedUI();

            const boardArray = game.board();

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const bgSq = document.createElement('div');
                    bgSq.className = `square ${(r+c)%2 === 0 ? 'light' : 'dark'}`;
                    bgGrid.appendChild(bgSq);

                    const intSq = document.createElement('div');
                    intSq.className = 'interact-square';
                    intSq.dataset.r = r; intSq.dataset.c = c;
                    intSq.onclick = () => handleSquareClick(r, c);
                    interactGrid.appendChild(intSq);

                    const pieceObj = boardArray[r][c];
                    if (pieceObj) {
                        const id = `piece-${state.pieceIdCounter++}`;
                        const color = pieceObj.color === 'w' ? 'white' : 'black';
                        const char = pieceObj.color === 'w' ? pieceObj.type.toUpperCase() : pieceObj.type.toLowerCase();
                        
                        const pieceDiv = document.createElement('div');
                        pieceDiv.className = 'piece';
                        pieceDiv.id = id;
                        pieceDiv.style.backgroundImage = `url('${getPieceUrl(char)}')`;
                        
                        const rotation = (color === 'black' && isFaceToFace) ? 'rotate(180deg)' : 'rotate(0deg)';
                        pieceDiv.style.transform = `translate(${c * 100}%, ${r * 100}%) ${rotation}`;
                        
                        piecesLayer.appendChild(pieceDiv);
                        state.piecesData.push({ id, r, c, color, type: char, el: pieceDiv, active: true });
                    }
                }
            }
        }

        function handleSquareClick(r, c) {
            if (state.gameOver) return;
            if (state.opponentMode === 'computer' && game.turn() === 'b') return; 

            const alg = toAlgebraic(r, c);
            const piece = game.get(alg);
            
            if (piece && piece.color === game.turn()) {
                state.selected = { r, c };
                const moves = game.moves({ square: alg, verbose: true });
                state.validMoves = moves.map(m => fromAlgebraic(m.to));
                updateInteractions();
                return;
            }

            if (state.selected) {
                const moveAllowed = state.validMoves.find(m => m.r === r && m.c === c);
                if (moveAllowed) {
                    executeMove(toAlgebraic(state.selected.r, state.selected.c), alg);
                } else {
                    state.selected = null;
                    state.validMoves = [];
                    updateInteractions();
                }
            }
        }

        function executeMove(fromAlg, toAlg) {
            const moves = game.moves({ verbose: true });
            const moveObj = moves.find(m => m.from === fromAlg && m.to === toAlg);
            if (!moveObj) return;

            const move = game.move({
                from: fromAlg,
                to: toAlg,
                promotion: moveObj.promotion ? 'q' : undefined 
            });

            if (!move) return;

            const fromPos = fromAlgebraic(fromAlg);
            const toPos = fromAlgebraic(toAlg);

            if (move.captured) {
                let capR = toPos.r;
                let capC = toPos.c;
                if (move.flags.includes('e')) {
                    capR = move.color === 'w' ? toPos.r + 1 : toPos.r - 1;
                }
                const capPieceObj = state.piecesData.find(p => p.r === capR && p.c === capC && p.active);
                if (capPieceObj) {
                    capPieceObj.active = false;
                    capPieceObj.el.style.opacity = '0';
                    capPieceObj.el.style.transform += ' scale(0)';
                    setTimeout(() => capPieceObj.el.remove(), 200);
                }
                
                const turnStr = move.color === 'w' ? 'white' : 'black';
                const capChar = move.color === 'w' ? move.captured.toLowerCase() : move.captured.toUpperCase();
                state.captured[turnStr].push(capChar);
                updateCapturedUI();
            }

            const pieceObj = state.piecesData.find(p => p.r === fromPos.r && p.c === fromPos.c && p.active);
            if (pieceObj) {
                pieceObj.r = toPos.r;
                pieceObj.c = toPos.c;
                const rotation = (pieceObj.color === 'black' && isFaceToFace) ? 'rotate(180deg)' : 'rotate(0deg)';
                pieceObj.el.style.transform = `translate(${toPos.c * 100}%, ${toPos.r * 100}%) ${rotation}`;

                if (move.promotion) {
                    pieceObj.type = move.color === 'w' ? 'Q' : 'q';
                    pieceObj.el.style.backgroundImage = `url('${getPieceUrl(pieceObj.type)}')`;
                }
            }

            if (move.flags.includes('k') || move.flags.includes('q')) {
                let rookFromC = move.flags.includes('k') ? 7 : 0;
                let rookToC = move.flags.includes('k') ? 5 : 3;
                let rookR = move.color === 'w' ? 7 : 0;
                
                const rookObj = state.piecesData.find(p => p.r === rookR && p.c === rookFromC && p.active);
                if (rookObj) {
                    rookObj.c = rookToC;
                    const rRotation = (move.color === 'b' && isFaceToFace) ? 'rotate(180deg)' : 'rotate(0deg)';
                    rookObj.el.style.transform = `translate(${rookToC * 100}%, ${rookR * 100}%) ${rRotation}`;
                }
            }

            state.selected = null;
            state.validMoves = [];
            updateInteractions();
            updateUIPanels();
            checkGameOver();

            if (!state.gameOver && state.opponentMode === 'computer' && game.turn() === 'b') {
                setTimeout(() => {
                    makeComputerMove();
                }, 200); // 200ms ডিলে, গেম ফাস্ট থাকবে কিন্তু আপনি চাল বুঝতে পারবেন
            }
        }

        /* ---------------- SMART & FAST AI LOGIC ---------------- */
        
        // পজিশনাল লজিক: কোন গুটি কোথায় রাখলে ভালো
        function getPositionalValue(type, color, r, c) {
            let score = 0;
            // বোর্ডের মাঝখানে থাকার সুবিধা (সেন্টার কন্ট্রোল)
            let centerDist = Math.abs(3.5 - r) + Math.abs(3.5 - c);
            
            if (type === 'n' || type === 'b' || type === 'q') {
                score += (7 - centerDist) * 3; // ঘোড়া বা মন্ত্রী সেন্টারে থাকলে বোনাস পয়েন্ট পাবে
            }
            if (type === 'p') {
                // বোড়ে (Pawn) সামনের দিকে গেলে বোনাস পাবে
                if (color === 'w') score += (7 - r) * 5;
                else score += r * 5;
                
                // মাঝখানের বোড়ে বেশি গুরুত্বপূর্ণ
                if (c >= 3 && c <= 4) score += 10;
            }
            if (type === 'k') {
                // রাজা কর্নারে সুরক্ষিত থাকে
                score += centerDist * 2; 
            }
            return score;
        }

        function evaluateBoard(g) {
            let score = 0;
            const vals = {'p': 100, 'n': 300, 'b': 300, 'r': 500, 'q': 900, 'k': 10000};
            const b = g.board();
            for(let r=0; r<8; r++){
                for(let c=0; c<8; c++){
                    if(b[r][c]){
                        let val = vals[b[r][c].type];
                        // গুটির আসল দামের সাথে পজিশন বোনাস যোগ করা হলো (এতেই এআই প্রো হয়ে যাবে!)
                        val += getPositionalValue(b[r][c].type, b[r][c].color, r, c);
                        score += (b[r][c].color === 'w' ? val : -val);
                    }
                }
            }
            return score;
        }

        // Alpha-Beta Pruning (হিসেব ফাস্ট করার অ্যালগরিদম)
        function minimax(g, depth, alpha, beta, isMaximizing) {
            if(depth === 0 || g.game_over()) return evaluateBoard(g);
            let moves = g.moves();
            if(isMaximizing) { 
                let maxEval = -Infinity;
                for(let i=0; i<moves.length; i++) {
                    g.move(moves[i]);
                    let ev = minimax(g, depth-1, alpha, beta, false);
                    g.undo();
                    maxEval = Math.max(maxEval, ev);
                    alpha = Math.max(alpha, ev);
                    if(beta <= alpha) break;
                }
                return maxEval;
            } else { 
                let minEval = Infinity;
                for(let i=0; i<moves.length; i++) {
                    g.move(moves[i]);
                    let ev = minimax(g, depth-1, alpha, beta, true);
                    g.undo();
                    minEval = Math.min(minEval, ev);
                    beta = Math.min(beta, ev);
                    if(beta <= alpha) break;
                }
                return minEval;
            }
        }

        function getBestMove(g, depth) {
            let moves = g.moves({verbose: true});
            if(moves.length === 0) return null;
            
            let bestMove = moves[0];
            let bestValue = Infinity; // কম্পিউটার কালো, তাই মান নেগেটিভ করতে চাইবে
            
            moves.sort(() => Math.random() - 0.5);

            for(let i=0; i<moves.length; i++) {
                g.move(moves[i]);
                let moveVal = minimax(g, depth - 1, -Infinity, Infinity, true); 
                g.undo();
                
                if(moveVal < bestValue) {
                    bestValue = moveVal;
                    bestMove = moves[i];
                }
            }
            return bestMove;
        }

        function makeComputerMove() {
            if (state.gameOver) return;
            let chosenMove = null;
            
            if (state.difficulty === 'easy') {
                // Depth 1: এক চাল দেখবে, কিন্তু পজিশনাল বোনাসের কারণে মাথা খাটিয়ে খেলবে
                chosenMove = getBestMove(game, 1); 
            } 
            else if (state.difficulty === 'medium') {
                // Depth 2: দুই চাল দেখবে। 
                chosenMove = getBestMove(game, 2); 
            } 
            else {
                // Depth 3: তিন চাল দেখবে। মাস্টার লেভেল।
                chosenMove = getBestMove(game, 3); 
            }
            executeMove(chosenMove.from, chosenMove.to);
        }
        /* -------------------------------------------------------------------------------- */

        function updateCapturedUI() {
            const wCapDiv = document.getElementById('white-captured');
            wCapDiv.innerHTML = '';
            const pieceOrder = { 'q':1, 'r':2, 'b':3, 'n':4, 'p':5, 'Q':1, 'R':2, 'B':3, 'N':4, 'P':5 };
            
            state.captured.white.sort((a,b) => pieceOrder[a] - pieceOrder[b]).forEach(type => {
                const div = document.createElement('div');
                div.className = 'captured-piece';
                div.style.backgroundImage = `url('${getPieceUrl(type)}')`;
                wCapDiv.appendChild(div);
            });

            const bCapDiv = document.getElementById('black-captured');
            bCapDiv.innerHTML = '';
            state.captured.black.sort((a,b) => pieceOrder[a] - pieceOrder[b]).forEach(type => {
                const div = document.createElement('div');
                div.className = 'captured-piece';
                div.style.backgroundImage = `url('${getPieceUrl(type)}')`;
                div.style.transform = isFaceToFace ? 'rotate(180deg)' : 'rotate(0deg)'; 
                bCapDiv.appendChild(div);
            });
        }

        function updateInteractions() {
            const cells = document.querySelectorAll('.interact-square');
            cells.forEach(cell => {
                cell.className = 'interact-square';
                cell.innerHTML = '';
                const r = parseInt(cell.dataset.r);
                const c = parseInt(cell.dataset.c);
                const alg = toAlgebraic(r, c);

                if (state.selected && state.selected.r === r && state.selected.c === c) {
                    cell.classList.add('selected');
                }

                const move = state.validMoves.find(m => m.r === r && m.c === c);
                if (move && state.showHints) {
                    const marker = document.createElement('div');
                    marker.className = game.get(alg) ? 'valid-capture' : 'valid-dot';
                    cell.appendChild(marker);
                }

                if (game.in_check() && state.showHints) {
                    const piece = game.get(alg);
                    if (piece && piece.type === 'k' && piece.color === game.turn()) {
                        cell.classList.add('in-check');
                    }
                }
            });
        }

        function updateUIPanels() {
            const turnStr = game.turn() === 'w' ? 'white' : 'black';
            const wPanel = document.getElementById('white-panel');
            const bPanel = document.getElementById('black-panel');
            if(turnStr === 'white') {
                wPanel.classList.add('active-panel');
                bPanel.classList.remove('active-panel');
            } else {
                bPanel.classList.add('active-panel');
                wPanel.classList.remove('active-panel');
            }
        }

        function startTimer() {
            state.interval = setInterval(() => {
                if(state.gameOver) return;
                const turnStr = game.turn() === 'w' ? 'white' : 'black';
                state.timers[turnStr]--;
                updateTimerDisplay();
                if(state.timers[turnStr] <= 0) {
                    const winner = turnStr === 'white' ? state.players.black : state.players.white;
                    endGame(winner, 'সময় শেষ হয়ে গেছে!');
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const format = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
            document.getElementById('white-timer').innerText = format(state.timers.white);
            document.getElementById('black-timer').innerText = format(state.timers.black);
            
            document.getElementById('white-timer').style.color = state.timers.white < 60 ? '#ff4d4d' : '#c9d1d9';
            document.getElementById('black-timer').style.color = state.timers.black < 60 ? '#ff4d4d' : '#c9d1d9';
        }

        function checkGameOver() {
            if (game.game_over()) {
                let reason = "গেম ওভার!";
                let winnerName = "ড্র (Draw)";
                
                if (game.in_checkmate()) {
                    winnerName = game.turn() === 'w' ? state.players.black : state.players.white;
                    reason = "চেকমেট! (Checkmate)";
                } else if (game.in_draw()) {
                    reason = "ম্যাচ ড্র! (Draw)";
                } else if (game.in_stalemate()) {
                    reason = "স্টেলমেট! (Stalemate)";
                } else if (game.in_threefold_repetition()) {
                    reason = "৩ বার একই পজিশন! (Repetition)";
                }
                endGame(winnerName, reason);
            }
        }

        function endGame(winnerName, reason) {
            state.gameOver = true;
            clearInterval(state.interval);
            const modal = document.getElementById('game-over-modal');
            
            if(winnerName === 'ড্র (Draw)') {
                document.getElementById('winner-msg').innerText = winnerName;
            } else {
                document.getElementById('winner-msg').innerText = `${winnerName} জিতেছে!`;
            }
            
            document.getElementById('reason-msg').innerText = reason;
            modal.style.display = 'flex';
        }

        initSettingsUI();

    </script>
